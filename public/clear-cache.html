<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Cache - Amplifi</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h1 {
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        .btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            margin: 1rem;
            transition: all 0.3s;
        }
        .btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .status {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Clear Cache</h1>
        <p>This will clear all cached files and force a fresh reload.</p>
        
        <button class="btn" onclick="clearAllCaches()">Clear All Caches</button>
        <button class="btn" onclick="reloadMessages()">Reload Messages Page</button>
        <button class="btn" onclick="goToMessages()">Go to Messages</button>
        
        <div id="status" class="status" style="display: none;"></div>
    </div>

    <script>
        async function clearAllCaches() {
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.innerHTML = 'Clearing caches...';
            
            try {
                // Clear service worker cache
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                }
                
                // Clear localStorage
                localStorage.clear();
                
                // Clear sessionStorage
                sessionStorage.clear();
                
                // Unregister service worker
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                }
                
                status.innerHTML = '✅ All caches cleared successfully!';
                status.style.background = 'rgba(40, 167, 69, 0.3)';
                
                setTimeout(() => {
                    location.reload(true);
                }, 2000);
                
            } catch (error) {
                status.innerHTML = '❌ Error clearing caches: ' + error.message;
                status.style.background = 'rgba(220, 53, 69, 0.3)';
            }
        }
        
        function reloadMessages() {
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.innerHTML = 'Reloading messages page...';
            
            // Force reload messages page
            window.open('/messages.html', '_blank');
            
            status.innerHTML = '✅ Messages page opened in new tab!';
            status.style.background = 'rgba(40, 167, 69, 0.3)';
        }
        
        function goToMessages() {
            window.location.href = '/messages.html';
        }
    </script>
</body>
</html>
